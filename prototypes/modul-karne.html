<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Süreç Karnesi Kontrol Listesi</title>
    <link rel="stylesheet" href="kontrol-common.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="breadcrumb">
                <a href="kontrol.html">Ana Sayfa</a> &gt; Süreç Karnesi Modülü
            </div>
            <h1>&#128203; Süreç Karnesi Kontrol Listesi</h1>
        </div>
        
        <div class="progress-section">
            <div id="progress-text">0 / 0 soru cevaplandı (0%)</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
        </div>
        
        <div class="questions-container" id="questions-container">
        </div>
        
        <div class="actions">
            <button class="btn" onclick="exportResults('karne', 'Süreç Karnesi')">Sonuçları Dışa Aktar</button>
            <button class="btn btn-secondary" onclick="window.location.href='kontrol.html'">Ana Sayfaya Dön</button>
            <button class="btn btn-danger" onclick="clearResults('karne', 'Süreç Karnesi')">Sonuçları Temizle</button>
        </div>
    </div>
    
    <script src="kontrol-common.js"></script>
    <script src="modul-karne.js"></script>
</body>
</html>
