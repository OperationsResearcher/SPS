<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Transparent background - no fill on circle -->

  <!-- Circular arc - navy, partial ring wrapping around (gap at top-right) -->
  <path d="M 100 14 A 86 86 0 1 1 168 42" fill="none" stroke="#2a4f78" stroke-width="8" stroke-linecap="round"/>

  <!-- Single diagonal arrow: lower-right to upper-left (↖ sol-yukarı) -->
  <!-- Shaft -->
  <line x1="148" y1="152" x2="64" y2="66" stroke="#2a4f78" stroke-width="13" stroke-linecap="round"/>
  <!-- Arrowhead pointing upper-left -->
  <polygon points="52,53  80,60  68,88" fill="#2a4f78"/>
</svg>
