<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Sayfa Bulunamadı | Kokpitim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
      background: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1e293b;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,.07), 0 20px 40px -8px rgba(0,0,0,.10);
      padding: 56px 48px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon-wrap {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: #eff6ff;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon-wrap i { font-size: 36px; color: #3b82f6; }

    .code {
      font-size: 80px;
      font-weight: 800;
      line-height: 1;
      color: #e2e8f0;
      letter-spacing: -4px;
      margin-bottom: 4px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 12px;
    }

    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 36px;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: filter .15s, transform .1s;
    }
    .btn:hover  { filter: brightness(1.06); }
    .btn:active { transform: scale(.97); }

    .btn-primary {
      background: #3b82f6;
      color: #fff;
    }

    .btn-secondary {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid #e2e8f0;
    }
    .btn-secondary:hover { background: #e2e8f0; filter: none; }

    .divider {
      border: none;
      border-top: 1px solid #f1f5f9;
      margin: 36px 0 24px;
    }

    .brand {
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: .4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <i class="fas fa-compass"></i>
    </div>
    <div class="code">404</div>
    <h1>Sayfa Bulunamadı</h1>
    <p>Aradığınız sayfa mevcut değil, taşınmış ya da kaldırılmış olabilir. Adresi kontrol edip tekrar deneyin.</p>
    <div class="actions">
      <a href="/" class="btn btn-primary">
        <i class="fas fa-house"></i> Ana Sayfaya Dön
      </a>
      <button onclick="window.history.back()" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Geri Git
      </button>
    </div>
    <hr class="divider">
    <span class="brand">KOKPİTİM</span>
  </div>
</body>
</html>
