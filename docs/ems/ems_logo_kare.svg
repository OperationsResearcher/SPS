<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-label="EMS amblem">
  <defs>
    <linearGradient id="ems-blue2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#234D82"/>
      <stop offset="100%" stop-color="#1B3F6E"/>
    </linearGradient>
  </defs>

  <!-- Arka plan yuvarlatılmış kare -->
  <rect width="120" height="120" rx="20" fill="url(#ems-blue2)"/>

  <!-- Dişli dişleri -->
  <g fill="#F8F9FA" opacity="0.95">
    <rect x="56" y="14" width="8" height="10" rx="1"/>
    <rect x="56" y="96" width="8" height="10" rx="1"/>
    <rect x="14" y="56" width="10" height="8" rx="1"/>
    <rect x="96" y="56" width="10" height="8" rx="1"/>
    <rect x="26" y="26" width="9" height="9" rx="1" transform="rotate(-45 30.5 30.5)"/>
    <rect x="85" y="26" width="9" height="9" rx="1" transform="rotate(45 89.5 30.5)"/>
    <rect x="26" y="85" width="9" height="9" rx="1" transform="rotate(45 30.5 89.5)"/>
    <rect x="85" y="85" width="9" height="9" rx="1" transform="rotate(-45 89.5 89.5)"/>
  </g>

  <!-- İç çelik halkası -->
  <circle cx="60" cy="60" r="34" fill="#6B7A8D"/>
  <circle cx="60" cy="60" r="30" fill="#F8F9FA"/>

  <!-- EMS yazısı -->
  <text x="60" y="73"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="800" fill="#1B3F6E"
        text-anchor="middle" letter-spacing="1">EMS</text>

  <!-- ESG yeşil yay -->
  <path d="M 60 18 a 42 42 0 0 1 36 24" stroke="#2E8B57" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
