# ============================================================================
# SWOT/TOWS/PESTEL/PORTER — 2026 detayli; diger yillar themes ile uretilir
# ============================================================================
swot_2026:
  strengths: |
    • IATF 16949 + ISO 9001 + ISO 14001 + ISO 45001 dörtlü sertifika
    • Bursa Demirtaş OSB'de stratejik konum (OEM müşterilerine 30 km)
    • Hairpin sargı teknolojisi lisansı (Türkiye'de sınırlı oyuncu)
    • TOGG ile aktif tedarik anlaşması (EV pazarındaki ilk yerli oyuncu)
    • Sıfır borç, %22 EBITDA marjı
    • 6 yıllık kurumsal yönetişim olgunluğu (kuruluştan kokpitim kullanımı)
  weaknesses: |
    • Müşteri konsantrasyonu yüksek: top 3 müşteri %58 ciro
    • Avrupa pazarına henüz tier-1 olarak doğrudan giremiyor (VW süreci devam)
    • Predictive maintenance / dijital ikiz henüz pilot aşamada
    • 100 çalışanlık ölçekte CAPEX yatırım gücü sınırlı
    • Ar-Ge yatırımı/ciro oranı %4 — global rakiplerin gerisinde
  opportunities: |
    • Türkiye EV pazarı 2030'a kadar 5x büyüyor (TOGG, Anadolu Isuzu vb.)
    • Avrupa otomotiv tedarik zincirinde Türkiye yükselen oyuncu (post-China+1+1)
    • CBAM hazırlığı tamamlanmışlık avantaja dönüşebilir
    • Yerli ve milli teşvikler (TÜBİTAK + KOSGEB)
    • V2G/V2H teknolojisi için erken pozisyonlanma
  threats: |
    • TL volatilitesi (hammadde %45 ithal)
    • Çin EV parça üreticilerinin Avrupa'ya dümdüz girmesi
    • Chip krizinin yeniden alevlenmesi (semi shortage)
    • Hammadde fiyat artışı (lityum, neodimyum)
    • Yetenekli mühendis havzasının Almanya'ya kaybedilmesi

# Yillara gore SWOT/TOWS/PESTEL/Porter temalar (script kisaltilmis metin uretir)
analyses_year_themes:
  2021: "Kuruluş, ilk OEM müşteri, sıfır geçmiş veri. Strengths: kurucu mühendis kadrosu, Bursa OSB konumu, ilk büyük sözleşme. Weaknesses: marka yok, deneyim yok, sınırlı sermaye. Opportunities: yerli üretim teşvikleri, Ford Otosan tedarik açığı. Threats: bilinmezlik, müşteri konsantrasyon riski."
  2022: "Pandemi + chip krizi. Strengths: küçük ölçek hızlı adapte. Weaknesses: kadro daraltma, finansal stres. Opportunities: yerlileşme baskısı artıyor. Threats: tedarik zinciri kopuşları, OEM üretim durması."
  2023: "Toparlanma + Avrupa açılım. Strengths: IATF sertifika alındı, ilk Avrupa müşteri. Weaknesses: ihracat yetkinlik az. Opportunities: Avrupa Türkiye'ye yöneliyor. Threats: TL volatilitesi yüksek."
  2024: "EV pivot kararı. Strengths: Bosch lisans, TOGG anlaşması. Weaknesses: EV teknolojisi yeni, kadro gelişimi gerek. Opportunities: Türkiye EV pazarı patlama. Threats: Çin parça rekabeti."
  2025: "Sürdürülebilirlik + CBAM. Strengths: yeşil dönüşüm yatırımları başladı. Weaknesses: ESG raporlama yeni. Opportunities: ESG müşteri talebi artıyor. Threats: CBAM 2027 yürürlük."
  2026: "Dijital dönüşüm + Industry 4.0. Detayli yukarida (swot_2026)."

