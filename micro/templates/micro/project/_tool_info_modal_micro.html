{# Micro — "Nasıl kullanılır?" araç bilgisi (Bootstrap yok). JS: micro-tool-info-modal.js #}
<div id="micro-tool-info-overlay" class="mc-modal-overlay" aria-hidden="true">
    <div class="mc-modal mc-modal-lg micro-tool-info-modal-panel" role="dialog" aria-modal="true" aria-labelledby="microToolInfoTitle">
        <div class="mc-modal-header">
            <div class="mc-modal-title" id="microToolInfoTitle">
                <i class="fas fa-info-circle"></i><span>Bilgi</span>
            </div>
            <button type="button" class="mc-modal-close" onclick="closeMicroToolInfoModal()" aria-label="Kapat"><i class="fas fa-times"></i></button>
        </div>
        <div class="mc-modal-body" id="microToolInfoBody"></div>
        <div class="mc-modal-footer">
            <button type="button" class="mc-btn mc-btn-secondary" onclick="closeMicroToolInfoModal()">Kapat</button>
        </div>
    </div>
</div>
