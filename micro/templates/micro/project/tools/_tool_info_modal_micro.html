<div id="microToolInfoModal" class="hidden fixed inset-0 z-[250] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm"
     role="dialog" aria-modal="true" aria-labelledby="toolInfoTitle" aria-hidden="true"
     onclick="if(event.target===this)closeToolInfoModal()">
    <div class="bg-white dark:bg-slate-900 rounded-xl shadow-2xl border border-slate-200 dark:border-slate-700 w-full max-w-3xl max-h-[90vh] flex flex-col overflow-hidden"
         onclick="event.stopPropagation()">
        <div class="flex items-center justify-between px-4 py-3 border-b border-slate-200 dark:border-slate-700 bg-indigo-600 dark:bg-indigo-800 text-white shrink-0">
            <h3 id="toolInfoTitle" class="font-semibold text-sm sm:text-base pr-2"></h3>
            <button type="button" class="p-2 rounded-lg hover:bg-white/10 transition-colors" onclick="closeToolInfoModal()" aria-label="Kapat">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="toolInfoBody" class="overflow-y-auto p-4 sm:p-5 flex-1 min-h-0"></div>
        <div class="px-4 py-3 border-t border-slate-200 dark:border-slate-700 shrink-0 flex justify-end">
            <button type="button" class="mc-btn mc-btn-secondary mc-btn-sm" onclick="closeToolInfoModal()">Kapat</button>
        </div>
    </div>
</div>
