{% extends "platform/base.html" %}
{% block title %}OKR Cascade — Kokpitim{% endblock %}
{% block page_title %}OKR Cascade{% endblock %}
{% block content %}
<div style="max-width:1200px;margin:0 auto;">
  <div style="margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;">
    <div>
      <h1 style="font-size:20px;font-weight:700;color:#1e293b;margin:0 0 4px;"><i class="fas fa-tasks" style="color:#0d9488;"></i> OKR Cascade</h1>
      <p style="font-size:13px;color:#64748b;margin:0;">Hedefler ve anahtar sonuçlar — strateji bağlantısı + KR ilerleme.</p>
    </div>
    <a href="{{ url_for('app_bp.raporlar_index') }}" class="mc-btn mc-btn-secondary"><i class="fas fa-arrow-left"></i> Raporlara Dön</a>
  </div>
  <div id="loading" style="text-align:center;padding:60px;color:#64748b;"><i class="fas fa-spinner fa-spin" style="font-size:24px;"></i></div>
  <div id="content" style="display:none;">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px;" id="summary"></div>
    <div id="list" style="display:grid;gap:14px;"></div>
  </div>
  <div id="error" style="display:none;background:#fef2f2;border:1px solid #fecaca;color:#991b1b;padding:14px;border-radius:8px;font-size:13px;"></div>
</div>
<script>
(function(){
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
  const stat = (l,v,c) => `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px;"><div style="font-size:10.5px;color:#64748b;font-weight:600;text-transform:uppercase;margin-bottom:4px;">${esc(l)}</div><div style="font-size:22px;font-weight:700;color:${c};">${esc(v)}</div></div>`;
  async function load(){
    try {
      const j = await (await fetch('/raporlar/api/okr-cascade',{credentials:'same-origin'})).json();
      if(!j.success) throw new Error(j.message);
      document.getElementById('loading').style.display='none';
      document.getElementById('content').style.display='block';
      const s = j.summary;
      document.getElementById('summary').innerHTML = [
        stat('Objective', s.total_objectives, '#0d9488'),
        stat('Key Result', s.total_krs, '#0ea5e9'),
        stat('Ort. Tamamlanma', '%'+s.avg_completion, s.avg_completion>=70?'#10b981':s.avg_completion>=40?'#f59e0b':'#dc2626'),
        stat('Plan Yılı', s.plan_year||'—', '#64748b'),
      ].join('');
      document.getElementById('list').innerHTML = j.objectives.length===0?'<div style="font-size:13px;color:#94a3b8;text-align:center;padding:30px;font-style:italic;">OKR objesi yok.</div>':j.objectives.map(o => {
        const ringColor = o.avg_progress>=70?'#10b981':o.avg_progress>=40?'#f59e0b':'#dc2626';
        return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px;border-left:4px solid ${ringColor};">
          <div style="display:flex;justify-content:space-between;align-items:start;gap:14px;flex-wrap:wrap;margin-bottom:10px;">
            <div>
              <div style="font-size:14px;font-weight:700;color:#0f172a;">${esc(o.title)}</div>
              <div style="font-size:11.5px;color:#64748b;margin-top:2px;">
                ${o.quarter?'Q'+o.quarter+' · ':''}${o.owner?esc(o.owner)+' · ':''}${o.strategy?'<span style="background:#eef2ff;color:#4338ca;padding:1px 7px;border-radius:6px;">'+esc(o.strategy)+'</span>':''}
              </div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:24px;font-weight:700;color:${ringColor};">%${o.avg_progress}</div>
              <div style="font-size:10.5px;color:#94a3b8;">${o.kr_count} KR</div>
            </div>
          </div>
          ${o.key_results.map(k => `
            <div style="background:#f8fafc;border-radius:6px;padding:8px 12px;margin-top:6px;display:flex;align-items:center;gap:12px;font-size:12px;">
              <div style="flex:1;min-width:0;">
                <div style="color:#475569;">${esc(k.title)} ${k.metric?'<span style="color:#94a3b8;">('+esc(k.metric)+')</span>':''}</div>
                <div style="font-size:10.5px;color:#94a3b8;">${k.start||'-'} → ${k.current||'-'} / ${k.target||'-'}</div>
              </div>
              <div style="width:100px;background:#e2e8f0;border-radius:4px;height:8px;overflow:hidden;">
                <div style="background:${(k.progress_pct||0)>=70?'#10b981':'#f59e0b'};height:100%;width:${Math.min(k.progress_pct||0,100)}%;"></div>
              </div>
              <div style="width:42px;text-align:right;font-weight:600;color:#0f172a;">%${k.progress_pct==null?'—':k.progress_pct}</div>
            </div>`).join('')}
        </div>`;
      }).join('');
    } catch(e){
      document.getElementById('loading').style.display='none';
      const err=document.getElementById('error');err.style.display='block';err.textContent='Hata: '+e.message;
    }
  }
  load();
})();
</script>
{% endblock %}
