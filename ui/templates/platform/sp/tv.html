<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KOKPİTİM — War Room</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: radial-gradient(1200px 600px at 50% -10%, #16233f 0%, #0b1220 60%);
      color: #e2e8f0;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
      overflow: hidden; height: 100vh; display: flex; flex-direction: column;
    }
    .tv-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 36px; border-bottom: 1px solid rgba(148,163,184,.14);
    }
    .tv-title { font-size: 22px; font-weight: 800; letter-spacing: .5px; }
    .tv-title .dot { color: #38bdf8; }
    .tv-sub { font-size: 12.5px; color: #94a3b8; margin-top: 2px; }
    .tv-clock { font-size: 30px; font-weight: 700; font-variant-numeric: tabular-nums; color: #f8fafc; }
    .tv-meta { font-size: 12px; color: #64748b; text-align: right; margin-top: 2px; }
    .tv-fs {
      margin-left: 18px; background: rgba(56,189,248,.12); color: #7dd3fc;
      border: 1px solid rgba(56,189,248,.3); border-radius: 8px; padding: 8px 12px;
      font-size: 12px; cursor: pointer;
    }
    .tv-hero {
      display: flex; align-items: center; gap: 40px; padding: 18px 36px 6px;
    }
    .tv-hero-score { display: flex; align-items: baseline; gap: 10px; }
    .tv-hero-num { font-size: 86px; font-weight: 800; line-height: 1; }
    .tv-hero-unit { font-size: 30px; color: #64748b; font-weight: 700; }
    .tv-hero-label { font-size: 13px; color: #94a3b8; letter-spacing: .12em; text-transform: uppercase; }
    .tv-hero-bar { flex: 1; height: 16px; background: #1e293b; border-radius: 9px; overflow: hidden; }
    .tv-hero-fill { height: 100%; width: 0; border-radius: 9px; transition: width 1s cubic-bezier(.2,.8,.2,1); }
    .tv-grid {
      flex: 1; display: grid; gap: 18px; padding: 14px 36px 32px;
      grid-template-columns: repeat(4, 1fr); grid-auto-rows: 1fr;
    }
    .tile {
      background: linear-gradient(160deg, #131f37, #0e1830);
      border: 1px solid rgba(148,163,184,.12); border-radius: 18px;
      padding: 22px 24px; display: flex; flex-direction: column; justify-content: center;
      position: relative; transition: transform .5s, box-shadow .5s, border-color .5s;
    }
    .tile .t-label { font-size: 12.5px; color: #94a3b8; letter-spacing: .08em; text-transform: uppercase; margin-bottom: 10px; }
    .tile .t-value { font-size: 52px; font-weight: 800; line-height: 1; }
    .tile .t-sub { font-size: 13px; color: #64748b; margin-top: 8px; }
    .tile.spot { transform: scale(1.035); box-shadow: 0 0 0 2px rgba(56,189,248,.5), 0 20px 60px rgba(0,0,0,.5); border-color: rgba(56,189,248,.6); }
    .c-good { color: #34d399; } .c-warn { color: #fbbf24; } .c-bad { color: #f87171; }
    .c-blue { color: #60a5fa; } .c-purple { color: #c4b5fd; } .c-sky { color: #7dd3fc; }
    .tv-loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; color: #64748b; }
    .tv-err { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #7f1d1d; color: #fecaca; padding: 10px 18px; border-radius: 10px; font-size: 13px; display: none; }
  </style>
</head>
<body data-snapshot-url="{{ url_for('app_bp.sp_api_exec_snapshot') }}">
  <div class="tv-head">
    <div>
      <div class="tv-title">KOKPİTİM <span class="dot">●</span> WAR ROOM</div>
      <div class="tv-sub" id="tv-sub">Yönetici Kokpiti — canlı</div>
    </div>
    <div style="display:flex; align-items:center;">
      <div>
        <div class="tv-clock" id="tv-clock">--:--:--</div>
        <div class="tv-meta" id="tv-updated">güncelleniyor…</div>
      </div>
      <button class="tv-fs" id="tv-fs">⛶ Tam ekran</button>
    </div>
  </div>

  <div class="tv-hero">
    <div class="tv-hero-score">
      <span class="tv-hero-num" id="hero-num">—</span>
      <span class="tv-hero-unit">/100</span>
    </div>
    <div style="flex:1;">
      <div class="tv-hero-label">Genel Sağlık Skoru</div>
      <div class="tv-hero-bar"><div class="tv-hero-fill" id="hero-fill"></div></div>
    </div>
  </div>

  <div class="tv-grid" id="tv-grid"></div>

  <div class="tv-loading" id="tv-loading">Kokpit yükleniyor…</div>
  <div class="tv-err" id="tv-err"></div>

  <script>
  (function() {
    var url = document.body.getAttribute("data-snapshot-url");
    var grid = document.getElementById("tv-grid");
    var loading = document.getElementById("tv-loading");
    var errEl = document.getElementById("tv-err");
    var spotIdx = 0, tiles = [];

    function band(v) { return v == null ? "" : (v >= 80 ? "c-good" : v >= 50 ? "c-warn" : "c-bad"); }
    function num(v) { return (v == null || isNaN(v)) ? "—" : v; }
    function countTo(el, to) {
      if (!el) return;
      if (to == null) { el.textContent = "—"; return; }
      var from = 0, dur = 900, t0 = null;
      function step(ts) {
        if (!t0) t0 = ts;
        var p = Math.min(1, (ts - t0) / dur);
        var e = 1 - Math.pow(1 - p, 3);
        var cur = from + (to - from) * e;
        el.textContent = (to >= 10 ? Math.round(cur) : cur.toFixed(1));
        if (p < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
    }

    function clock() {
      var d = new Date();
      function p(n) { return (n < 10 ? "0" : "") + n; }
      document.getElementById("tv-clock").textContent = p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
    }
    setInterval(clock, 1000); clock();

    function tile(label, value, sub, cls) {
      return '<div class="tile"><div class="t-label">' + label + '</div>' +
             '<div class="t-value ' + (cls || "") + '">' + value + '</div>' +
             '<div class="t-sub">' + (sub || "") + '</div></div>';
    }

    function render(s) {
      loading.style.display = "none";
      var hs = s.health_score;
      countTo(document.getElementById("hero-num"), (typeof hs === "number") ? hs : null);
      var fill = document.getElementById("hero-fill");
      var pct = (typeof hs === "number") ? Math.max(0, Math.min(100, hs)) : 0;
      var col = pct >= 80 ? "#34d399" : pct >= 50 ? "#fbbf24" : "#f87171";
      fill.style.background = col;
      requestAnimationFrame(function() { setTimeout(function() { fill.style.width = pct + "%"; }, 50); });

      var kpi = s.kpi || {}, st = s.strategy || {}, act = s.activity || {},
          risk = s.risk || {}, ano = s.anomaly || {}, trg = s.trigger || {};
      var cov = (kpi.total ? Math.round((kpi.with_data / kpi.total) * 100) : 0);
      grid.innerHTML =
        tile("Hedef Üstü", num(kpi.on_target_pct) + "<span style='font-size:24px;color:#64748b;'>%</span>", "PG hedefin üstünde", band(kpi.on_target_pct)) +
        tile("PG Veri Kapsamı", cov + "<span style='font-size:24px;color:#64748b;'>%</span>", (kpi.with_data || 0) + " / " + (kpi.total || 0) + " PG", band(cov)) +
        tile("Stratejiler", num(st.count), (st.sub_count || 0) + " alt strateji", "c-purple") +
        tile("Aktif Faaliyet", num(act.active), (act.total || 0) + " toplam", "c-blue") +
        tile("Geciken Faaliyet", num(act.overdue), "termini geçti", (act.overdue ? "c-bad" : "c-good")) +
        tile("Açık Risk", num(risk.open), (risk.critical || 0) + " kritik", (risk.critical ? "c-bad" : "c-warn")) +
        tile("Yüksek Anomali", num(ano.high), (ano.medium || 0) + " orta", (ano.high ? "c-bad" : "c-good")) +
        tile("Tetiklenen Kural (7g)", num(trg.fired_last_7d), (trg.active || 0) + " aktif kural", "c-sky");
      tiles = grid.querySelectorAll(".tile");
      var now = new Date();
      document.getElementById("tv-updated").textContent = "güncellendi " +
        ("0" + now.getHours()).slice(-2) + ":" + ("0" + now.getMinutes()).slice(-2);
    }

    function spotlight() {
      if (!tiles.length) return;
      tiles.forEach(function(t) { t.classList.remove("spot"); });
      tiles[spotIdx % tiles.length].classList.add("spot");
      spotIdx++;
    }
    setInterval(spotlight, 4000);

    function load() {
      fetch(url, { headers: { "X-Requested-With": "XMLHttpRequest" }, credentials: "same-origin" })
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(d) {
          if (!d || !d.success || !d.snapshot) { throw new Error("veri yok"); }
          errEl.style.display = "none";
          render(d.snapshot);
          if (!tiles.length) return;
          spotIdx = 0; spotlight();
        })
        .catch(function() {
          errEl.textContent = "Veri alınamadı — 30 sn sonra tekrar denenecek.";
          errEl.style.display = "block";
          loading.style.display = "none";
        });
    }

    document.getElementById("tv-fs").addEventListener("click", function() {
      if (!document.fullscreenElement) {
        (document.documentElement.requestFullscreen || function(){})();
      } else {
        (document.exitFullscreen || function(){})();
      }
    });

    load();
    setInterval(load, 30000);   // 30 sn'de bir otomatik yenile
  })();
  </script>
</body>
</html>
