{% extends "platform/base.html" %}
{% block title %}Blue Ocean — Kokpitim{% endblock %}
{% block page_title %}Blue Ocean Strategy — Canvas & ERRC{% endblock %}

{% block content %}
<div style="max-width:1200px;margin:0 auto;"
     id="bo-root"
     data-list-url="{{ url_for('app_bp.sp_api_bo_canvases') }}"
     data-create-url="{{ url_for('app_bp.sp_api_bo_canvases') }}">

  <div class="mc-page-header" style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
    <div>
      <h2 style="font-size:20px;font-weight:700;color:#1e293b;margin:0 0 4px;">
        <i class="fas fa-water"></i> Blue Ocean Strategy
      </h2>
      <p style="font-size:13px;color:#64748b;margin:0;">
        Strategy Canvas (Value Curve) + ERRC Grid: rakipsiz pazar alanı tasarımı.
      </p>
    </div>
    <button class="mc-btn mc-btn-primary" id="bo-new">
      <i class="fas fa-plus"></i> Yeni Canvas
    </button>
  </div>

  <div id="bo-list"></div>

  <div id="bo-detail" style="display:none;margin-top:24px;"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function(){
  const root = document.getElementById('bo-root');
  let chart = null;

  async function load() {
    const r = await fetch(root.dataset.listUrl);
    const j = await r.json();
    const list = document.getElementById('bo-list');
    if (!j.items || !j.items.length) {
      list.innerHTML = '<div class="mc-card" style="padding:30px;text-align:center;color:#64748b;">Henüz canvas yok. "Yeni Canvas" ile başlayın.</div>';
      return;
    }
    list.innerHTML = j.items.map(c => `
      <div class="mc-card" style="padding:14px;margin-bottom:8px;cursor:pointer;" onclick="bo_open(${c.id})">
        <div style="font-size:14px;font-weight:600;color:#1e293b;">${c.name}</div>
        <div style="font-size:12px;color:#64748b;margin-top:4px;">
          ${c.industry || ''} • ${c.factor_count} faktör • ${c.errc_count} ERRC öğesi
          ${c.competitor_names.length ? '• Rakip: ' + c.competitor_names.join(', ') : ''}
        </div>
      </div>
    `).join('');
  }

  window.bo_open = async function(cid) {
    const r = await fetch('/sp/api/blue-ocean/canvases/' + cid);
    const j = await r.json();
    if (!j.success) return;
    const factors = j.factors;
    const errc = j.errc;
    const competitors = j.canvas.competitor_names || [];

    const errcGroups = {eliminate:[], reduce:[], raise:[], create:[]};
    errc.forEach(e => errcGroups[e.action] && errcGroups[e.action].push(e));

    const det = document.getElementById('bo-detail');
    det.style.display = 'block';
    det.innerHTML = `
      <div class="mc-card" style="padding:20px;margin-bottom:16px;">
        <h3 style="margin:0;">${j.canvas.name}</h3>
        <div style="color:#64748b;font-size:13px;margin-top:4px;">${j.canvas.industry || ''}</div>
        ${j.canvas.description ? `<p style="margin-top:8px;color:#475569;">${j.canvas.description}</p>` : ''}
        <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
          <button class="mc-btn mc-btn-secondary" onclick="bo_add_factor(${cid})"><i class="fas fa-plus"></i> Faktör Ekle</button>
          <button class="mc-btn mc-btn-secondary" onclick="bo_add_errc(${cid})"><i class="fas fa-th-large"></i> ERRC Öğesi</button>
        </div>
      </div>

      <div class="mc-card" style="padding:20px;margin-bottom:16px;">
        <h4 style="margin:0 0 12px;">📈 Value Curve (Strategy Canvas)</h4>
        <canvas id="bo-chart" height="120"></canvas>
      </div>

      <div class="mc-card" style="padding:20px;">
        <h4 style="margin:0 0 12px;">🎯 ERRC Grid (Eliminate / Reduce / Raise / Create)</h4>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          ${['eliminate','reduce','raise','create'].map(a => {
            const colors = {eliminate:'#fecaca', reduce:'#fed7aa', raise:'#bbf7d0', create:'#bfdbfe'};
            const titles = {eliminate:'❌ Eliminate (Kaldır)', reduce:'⬇️ Reduce (Azalt)', raise:'⬆️ Raise (Yükselt)', create:'⭐ Create (Yarat)'};
            return `
              <div style="background:${colors[a]};padding:12px;border-radius:8px;min-height:120px;">
                <div style="font-weight:600;margin-bottom:8px;">${titles[a]}</div>
                ${errcGroups[a].map(e => `<div style="background:#fff;padding:6px;border-radius:4px;margin-bottom:4px;font-size:12px;">${e.text}${e.impact?` <span style="font-size:10px;color:#64748b;">[${e.impact}]</span>`:''}</div>`).join('') || '<div style="color:#64748b;font-size:12px;">— Boş</div>'}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;

    // Chart
    if (chart) chart.destroy();
    const ctx = document.getElementById('bo-chart').getContext('2d');
    const labels = factors.map(f => f.name);
    const datasets = [{
      label: 'Bizim Kurum',
      data: factors.map(f => f.self_score),
      borderColor: '#0ea5e9',
      backgroundColor: 'rgba(14,165,233,0.1)',
      borderWidth: 3, tension: 0.3,
    }];
    competitors.forEach((cname, i) => {
      const colors = ['#dc2626','#f59e0b','#8b5cf6','#10b981'];
      datasets.push({
        label: cname,
        data: factors.map(f => f.competitor_scores[cname] ?? null),
        borderColor: colors[i % colors.length],
        borderDash: [5, 5],
        backgroundColor: 'transparent',
        tension: 0.3,
      });
    });
    chart = new Chart(ctx, {
      type: 'line',
      data: {labels, datasets},
      options: {scales: {y: {min: 0, max: 10}}, responsive: true},
    });
  };

  window.bo_add_factor = async function(cid) {
    const name = prompt('Faktör adı (ör: Fiyat, Kalite, Hız):');
    if (!name) return;
    const self_score = parseFloat(prompt('Kendi kurum puanı (1-10):', '5'));
    const compStr = prompt('Rakip puanları (JSON, ör: {"RakipA":7,"RakipB":4}):', '{}');
    let comp = {};
    try { comp = JSON.parse(compStr); } catch (e) { alert('JSON hatası'); return; }
    const r = await fetch(`/sp/api/blue-ocean/canvases/${cid}/factors`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, self_score, competitor_scores: comp}),
    });
    if (r.ok) bo_open(cid);
  };

  window.bo_add_errc = async function(cid) {
    const action = prompt('Aksiyon (eliminate/reduce/raise/create):');
    if (!action) return;
    const text = prompt('Açıklama:');
    if (!text) return;
    const impact = prompt('Etki (high/medium/low):', 'medium');
    const r = await fetch(`/sp/api/blue-ocean/canvases/${cid}/errc`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({action, text, impact}),
    });
    if (r.ok) bo_open(cid);
  };

  document.getElementById('bo-new').onclick = async () => {
    const name = prompt('Canvas adı:');
    if (!name) return;
    const industry = prompt('Sektör:', '');
    const competitor_names = prompt('Rakipler (virgülle ayırın):', '');
    const r = await fetch(root.dataset.createUrl, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, industry, competitor_names}),
    });
    if (r.ok) load();
  };

  load();
})();
</script>
{% endblock %}
