{% extends "platform/base.html" %}
{% block title %}Sayfa Bulunamadı — Kokpitim{% endblock %}
{% block page_title %}Sayfa Bulunamadı{% endblock %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:center; min-height:60vh;">
  <div style="text-align:center; max-width:420px;">

    <div style="width:96px; height:96px; border-radius:50%; background:#fef3c7; display:flex; align-items:center; justify-content:center; margin:0 auto 24px; font-size:40px;">
      <i class="fas fa-map-signs" style="color:#d97706;"></i>
    </div>

    <div style="font-size:72px; font-weight:800; color:#f1f5f9; line-height:1; margin-bottom:8px;">404</div>

    <h2 style="font-size:20px; font-weight:700; color:var(--text-default); margin:0 0 8px;">Sayfa Bulunamadı</h2>
    <p style="font-size:14px; color:#64748b; margin:0 0 28px; line-height:1.6;">
      Aradığınız sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir.
    </p>

    <div style="display:flex; gap:10px; justify-content:center;">
      <a href="{{ url_for('app_bp.launcher') }}" class="mc-btn mc-btn-primary">
        <i class="fas fa-home"></i> Ana Sayfaya Dön
      </a>
      <button onclick="history.back()" class="mc-btn mc-btn-secondary">
        <i class="fas fa-arrow-left"></i> Geri Git
      </button>
    </div>

  </div>
</div>
{% endblock %}
