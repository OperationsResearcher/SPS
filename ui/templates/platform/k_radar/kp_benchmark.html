{% extends "platform/base.html" %}
{% block title %}K-Radar KP Benchmark{% endblock %}
{% block page_title %}KP-Radar Benchmark{% endblock %}
{% block content %}
<div id="k-radar-kp-benchmark-root" data-url="{{ url_for('app_bp.k_radar_api_kp_benchmark') }}" style="max-width:900px; margin:0 auto;">
  <div class="mc-card"><div class="mc-card-body">
    <h3 style="margin-top:0;">Benchmark Özeti</h3>
    <div><strong>Karşılaştırılabilirlik:</strong> <span id="kp-benchmark-score">-</span></div>
    <div><strong>Dönem Satırı:</strong> <span id="kp-benchmark-rows">-</span></div>
    <div><strong>30g Trend:</strong> <span id="kp-benchmark-trend">-</span></div>
  </div></div>
</div>
{% endblock %}
{% block extra_js %}<script src="{{ url_for('app_bp.static', filename='platform/js/k_radar.js') }}"></script>{% endblock %}
