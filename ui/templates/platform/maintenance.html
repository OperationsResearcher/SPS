<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ _("Bakımda — Kokpitim") }}</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      max-width: 32rem;
      margin: 4rem auto;
      padding: 1.25rem;
      line-height: 1.5;
    }
    h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { margin: 0.5rem 0; color: #444; }
    @media (prefers-color-scheme: dark) {
      p { color: #bbb; }
    }
    .hint { font-size: 0.85rem; margin-top: 1.5rem; opacity: 0.85; }
    code { font-size: 0.9em; }
  </style>
</head>
<body>
  <h1>{{ _("Şu anda bakımdayız") }}</h1>
  <p>{{ _("Planlı güncelleme veya altyapı işleri nedeniyle sistem geçici olarak kullanıma kapalıdır. Lütfen bir süre sonra tekrar deneyin.") }}</p>
  {% if acil_erisim_tanimli %}
  <p class="hint">{{ _("Yetkili personel için acil erişim, kurum içi dokümantasyonda tanımlıdır.") }}</p>
  {% endif %}
</body>
</html>
