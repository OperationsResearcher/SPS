<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" class="kule-svg" aria-hidden="true">
  <defs>
    <linearGradient id="kule-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="kule-cabin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <filter id="kule-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#1e293b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#kule-shadow)">
    <!-- Taban -->
    <ellipse cx="32" cy="58" rx="16" ry="3" fill="#cbd5e1" opacity="0.6"/>

    <!-- Alt taban -->
    <rect x="20" y="48" width="24" height="8" rx="2" fill="url(#kule-body)" stroke="#cbd5e1" stroke-width="0.8"/>

    <!-- Gövde -->
    <rect x="24" y="28" width="16" height="22" rx="1.5" fill="url(#kule-body)" stroke="#cbd5e1" stroke-width="0.8"/>

    <!-- Şerit detayı -->
    <rect x="24" y="36" width="16" height="2" fill="#4f46e5" opacity="0.7"/>

    <!-- Üst kabin (cam) -->
    <path d="M19 28 L45 28 L41 18 L23 18 Z" fill="url(#kule-cabin)" stroke="#94a3b8" stroke-width="0.8"/>
    <!-- Kabin ışığı (durum göstergesi) -->
    <circle cx="32" cy="23" r="2.5" fill="var(--kule-light, #10b981)" class="kule-light">
      <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
    </circle>

    <!-- Üst çatı -->
    <rect x="25" y="14" width="14" height="4" rx="1" fill="#1e293b"/>

    <!-- Anten direği -->
    <line x1="32" y1="14" x2="32" y2="6" stroke="#1e293b" stroke-width="1.4" stroke-linecap="round"/>
    <circle cx="32" cy="5" r="1.5" fill="#dc2626"/>

    <!-- Dönen anten çubukları -->
    <g class="kule-antenna" style="transform-origin: 32px 10px;">
      <line x1="22" y1="10" x2="42" y2="10" stroke="#1e293b" stroke-width="1.2" stroke-linecap="round"/>
      <circle cx="22" cy="10" r="1" fill="#1e293b"/>
      <circle cx="42" cy="10" r="1" fill="#1e293b"/>
    </g>
  </g>
</svg>
