# Babel çıkarım (extract) yapılandırması.
#
# ⚠ EXTRACT KOMUTU `-k t` İLE KOŞULMALI:
#
#     pybabel extract -F babel.cfg -k t -o messages.pot .
#     pybabel update  -i messages.pot -d translations --no-fuzzy-matching
#     pybabel compile -d translations
#
# NEDEN (I6, ölçüm 2026-07-21):
#   JS tarafı çeviri için `window.t("…")` kullanıyor (base.html:30) ve 44 JS
#   dosyası bunu benimsemiş. Ama Babel varsayılan olarak yalnız `gettext`,
#   `_`, `ngettext` … anahtar sözcüklerini arar — `t` BUNLARIN İÇİNDE DEĞİL.
#
#   Sonuç: `-k t` olmadan çıkarılan POT'ta JS kaynaklı SIFIR kayıt oluyordu.
#   `t()` ile düzgünce sarılmış 458 dize aylardır .po'ya hiç girmedi; İngilizce
#   arayüzde hepsi Türkçe görünüyordu.
#
#   Rapor bunu "benimsenme yarım kalmış" diye okumuştu; gerçek sebep sarmanın
#   eksikliği değil, ÇIKARIMIN HİÇ ÇALIŞMAMASIYDI.
#
#   Ölçüm: `-k t` ile POT 3617 → 4075 msgid (JS kaynaklı 867 kayıt).

[python: **.py]
[jinja2: **/templates/**.html]
[javascript: ui/static/platform/js/**.js]
